# PROJ-15/20: Deploy der Staging-Umgebungen (develop → flexcover-staging.eforms.de
# UND portal-staging.eforms.de). Bei Push auf develop: auf dem Server `git pull` +
# Container neu bauen. Nutzt die Secrets DEPLOY_HOST/USER/SSH_KEY; Pfade fest.

name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/flexcover-staging
            git pull --ff-only
            docker compose up -d --build
            cd /opt/flexcover-portal-staging
            git pull --ff-only
            docker compose up -d --build
            docker image prune -f
