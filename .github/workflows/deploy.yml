# PROJ-14: Deploy auf den Hetzner Cloud Server per SSH.
# Bei Push auf main (oder manuell): auf dem Server `git pull` + Container neu bauen.
# Benötigte Repository-Secrets:
#   DEPLOY_HOST     – IP/Hostname des Cloud Servers
#   DEPLOY_USER     – SSH-Benutzer (z. B. deploy)
#   DEPLOY_SSH_KEY  – privater SSH-Key (PEM) mit Zugang
#   DEPLOY_PATH     – Pfad des geklonten Repos auf dem Server (z. B. /opt/flexcover)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull --ff-only
            docker compose up -d --build
            docker image prune -f
