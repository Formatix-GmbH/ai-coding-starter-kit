# PROJ-14: App-Service hinter dem vorhandenen Traefik-Reverse-Proxy.
# Traefik (separates Projekt /opt/apps/traefik) terminiert TLS mit dem
# Cloudflare-Origin-Zertifikat und routet flexcover.eforms.de → app:3000 über das
# externe Docker-Netz `proxy`. DB/Auth = Supabase (extern). Variablen aus ./.env.

services:
  app:
    build:
      context: .
      args:
        # Öffentliche Werte (zur Buildzeit in den Client inlined).
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
        NEXT_PUBLIC_ENABLE_TESTDATA: ${NEXT_PUBLIC_ENABLE_TESTDATA:-}
    restart: unless-stopped
    # Laufzeit-Env (inkl. Secrets: RESEND_API_KEY, SUBMISSION_EMAIL_FROM). Nur Server.
    env_file:
      - .env
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.flexcover.rule=Host(`flexcover.eforms.de`)"
      - "traefik.http.routers.flexcover.entrypoints=websecure"
      - "traefik.http.routers.flexcover.tls=true"
      - "traefik.http.services.flexcover.loadbalancer.server.port=3000"

# Traefik liegt im externen Netz `proxy` (von dessen Compose-Projekt erstellt).
networks:
  proxy:
    external: true
